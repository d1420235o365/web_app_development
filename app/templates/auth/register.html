{% extends "base.html" %}

{% block title %}註冊帳號 - 食譜收藏夾{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-0 mt-5">
            <div class="card-body p-4">
                <h1 class="h3 mb-4 text-center">加入食譜收藏夾 🧑‍🍳</h1>
                <form action="{{ url_for('auth.register') }}" method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label">使用者名稱</label>
                        <input type="text" class="form-control" id="username" name="username" required placeholder="給自己取個暱稱">
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">電子郵件</label>
                        <input type="email" class="form-control" id="email" name="email" required placeholder="example@email.com">
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="password" class="form-label">設定密碼</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                        <div class="col-md-6 mb-4">
                            <label for="password_confirm" class="form-label">確認密碼</label>
                            <input type="password" class="form-control" id="password_confirm" name="password_confirm" required>
                        </div>
                    </div>
                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-warning fw-bold">建立帳號</button>
                    </div>
                    <p class="text-center text-muted small">
                        已經有帳號了？ <a href="{{ url_for('auth.login_page') }}">返回登入</a>
                    </p>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
