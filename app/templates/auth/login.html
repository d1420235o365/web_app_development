{% extends "base.html" %}

{% block title %}登入 - 食譜收藏夾{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm border-0 mt-5">
            <div class="card-body p-4">
                <h1 class="h3 mb-4 text-center">歡迎回來 👋</h1>
                <form action="{{ url_for('auth.login') }}" method="POST">
                    <div class="mb-3">
                        <label for="email" class="form-label">電子郵件</label>
                        <input type="email" class="form-control" id="email" name="email" required placeholder="example@email.com">
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label">密碼</label>
                        <input type="password" class="form-control" id="password" name="password" required placeholder="請輸入密碼">
                    </div>
                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-warning fw-bold">登入系統</button>
                    </div>
                    <p class="text-center text-muted small">
                        還沒有帳號嗎？ <a href="{{ url_for('auth.register_page') }}">立即註冊</a>
                    </p>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
