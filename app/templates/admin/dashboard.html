{% extends "base.html" %}

{% block title %}管理後台 - 微型圖書館{% endblock %}

{% block content %}
<div class="row mb-4 align-items-center">
    <div class="col-md-6">
        <h1 class="fw-bold">管理員後台</h1>
    </div>
    <div class="col-md-6 text-md-end">
        <a href="{{ url_for('admin.add_book') }}" class="btn btn-primary">➕ 新增圖書</a>
        <a href="{{ url_for('admin.overdue_list') }}" class="btn btn-warning">⏳ 逾期追蹤</a>
    </div>
</div>

<div class="row g-4 mb-5">
    <div class="col-md-4">
        <div class="card border-0 shadow-sm text-center p-4">
            <h3 class="text-muted small text-uppercase">館藏總數</h3>
            <div class="display-4 fw-bold">{{ total_books }}</div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card border-0 shadow-sm text-center p-4">
            <h3 class="text-muted small text-uppercase">借閱中書籍</h3>
            <div class="display-4 fw-bold text-primary">{{ active_borrows }}</div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card border-0 shadow-sm text-center p-4">
            <h3 class="text-muted small text-uppercase">系統健康度</h3>
            <div class="display-4 fw-bold text-success">100%</div>
        </div>
    </div>
</div>

<div class="card border-0 shadow-sm">
    <div class="card-header bg-white py-3">
        <h5 class="card-title mb-0 fw-bold">全部圖書管理</h5>
    </div>
    <div class="card-body p-0">
        <!-- 這裡可以實作表格列出所有書籍並提供 編輯/刪除 按鈕 -->
        <div class="p-4 text-center text-muted">
            <p>管理介面已就緒，可從上方按鈕新增書籍。</p>
            <p class="small">（後續可在此擴充完整的資料表格）</p>
        </div>
    </div>
</div>
{% endblock %}
