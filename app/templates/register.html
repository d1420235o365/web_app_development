{% extends "base.html" %}

{% block title %}註冊 - 微型圖書館{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm border-0 mt-5">
            <div class="card-body p-5">
                <h2 class="text-center mb-4 fw-bold">建立帳號</h2>
                <form action="{{ url_for('auth.register') }}" method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label">帳號名稱</label>
                        <input type="text" name="username" id="username" class="form-control" required autofocus>
                        <div class="form-text">這將作為您的唯一登入識別。</div>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">密碼</label>
                        <input type="password" name="password" id="password" class="form-control" required>
                    </div>
                    <div class="mb-4">
                        <label for="confirm_password" class="form-label">確認密碼</label>
                        <input type="password" name="confirm_password" id="confirm_password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2">完成註冊</button>
                </form>
                <div class="text-center mt-4">
                    <span class="text-muted">已有帳號？</span>
                    <a href="{{ url_for('auth.login') }}" class="text-decoration-none">返回登入</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
